# fly.toml - Fly.io deployment config for TÜİK MCP Server

app = "tuik-mcp"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  DOTNET_RUNNING_IN_CONTAINER = "true"
